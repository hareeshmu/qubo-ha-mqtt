type: custom:button-card
entity: sensor.qubo_r700_pm25
show_state: false
show_name: false
show_icon: false
tap_action:
  action: more-info
  entity: fan.qubo_r700_fan
styles:
  card:
    - background: '#0a0f0a'
    - height: 260px
    - border-radius: 18px
    - border: none
    - box-shadow: none
  grid:
    - place-items: center
custom_fields:
  ring: |
    [[[
      var v = parseInt(entity.state) || 0;
      var color = v < 30 ? '#4ade80' : v < 60 ? '#facc15' : v < 120 ? '#f97316' : '#ef4444';
      var label = v < 30 ? 'Good' : v < 60 ? 'Moderate' : v < 120 ? 'Poor' : 'Very Poor';
      return `
        <div style="
          width: 200px; height: 200px;
          border-radius: 50%;
          background: radial-gradient(circle at center, #0a0f0a 60%, ${color}22 100%);
          box-shadow: 0 0 50px ${color}88, inset 0 0 0 3px ${color};
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          color: white;
          font-family: system-ui, sans-serif;
        ">
          <div style="font-size: 12px; color: #8899aa; letter-spacing: 2px;">PM 2.5</div>
          <div style="font-size: 56px; font-weight: 300; line-height: 1; margin: 4px 0;">${v}</div>
          <div style="font-size: 18px; color: #cbd5e1;">${label}</div>
        </div>
      `;
    ]]]
